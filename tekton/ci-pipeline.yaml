# =============================================================================
# CI Pipeline: sample-cicd-app
#
# フロー: git-clone → cmake-build-test → buildah → update-manifests
#
# 事前にカスタマイズが必要な箇所:
#   - <GITEA_HOST>       : Gitea のホスト名 (例: gitea.example.com)
#   - <MIRROR_REGISTRY>  : ミラーレジストリのアドレス (例: registry.example.com)
#   - <NAMESPACE>        : Tekton リソースをデプロイする namespace
# =============================================================================
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: sample-cicd-pipeline
  namespace: <NAMESPACE>
spec:
  params:
    - name: git-url
      type: string
      description: Gitea リポジトリ URL
    - name: git-revision
      type: string
      description: Git リビジョン (ブランチ名またはコミットハッシュ)
      default: main
    - name: image-name
      type: string
      description: ビルドするコンテナイメージ名
      default: <MIRROR_REGISTRY>/sample-cicd-app/smart-mobility-backend
    - name: manifests-repo-url
      type: string
      description: マニフェストリポジトリの URL
      default: https://<GITEA_HOST>/<GITEA_OWNER>/sample-cicd-app-manifests.git
    - name: manifests-branch
      type: string
      description: マニフェストリポのターゲットブランチ
      default: develop

  workspaces:
    - name: shared-workspace
    - name: git-credentials
      description: Gitea 認証情報 (Secret)
      optional: true

  tasks:
    # ------------------------------------------------------------------
    # Step 1: git-clone (ClusterTask)
    # ------------------------------------------------------------------
    - name: git-clone
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.git-url)
        - name: REVISION
          value: $(params.git-revision)
        - name: DELETE_EXISTING
          value: "true"
      workspaces:
        - name: output
          workspace: shared-workspace

    # ------------------------------------------------------------------
    # Step 2: cmake-build-test (カスタム Task)
    # ------------------------------------------------------------------
    - name: cmake-build-test
      runAfter:
        - git-clone
      workspaces:
        - name: source
          workspace: shared-workspace
      taskSpec:
        workspaces:
          - name: source
        results:
          - name: test-result
            description: テスト結果 (PASSED / FAILED)
        steps:
          - name: build-and-test
            # エアギャップ環境: DevSpaces UDI イメージまたは C++ ビルドツール入りイメージを指定
            image: <MIRROR_REGISTRY>/udi-cpp-dev:latest
            workingDir: $(workspaces.source.path)
            script: |
              #!/bin/bash
              set -e

              echo "=== CMake Configure ==="
              mkdir -p build && cd build
              cmake -DCMAKE_BUILD_TYPE=Release ..

              echo "=== CMake Build ==="
              cmake --build . --parallel $(nproc)

              echo "=== Run Tests ==="
              if ctest --output-on-failure; then
                echo "PASSED" | tee $(results.test-result.path)
              else
                echo "FAILED" | tee $(results.test-result.path)
                exit 1
              fi

    # ------------------------------------------------------------------
    # Step 3: buildah (ClusterTask)
    # ------------------------------------------------------------------
    - name: buildah
      runAfter:
        - cmake-build-test
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      params:
        - name: IMAGE
          value: $(params.image-name):$(params.git-revision)
        - name: DOCKERFILE
          value: Containerfile
        - name: TLS_VERIFY
          value: "false"
      workspaces:
        - name: source
          workspace: shared-workspace

    # ------------------------------------------------------------------
    # Step 4: update-manifests (カスタム Task)
    # ------------------------------------------------------------------
    - name: update-manifests
      runAfter:
        - buildah
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: git-credentials
          workspace: git-credentials
      taskSpec:
        params:
          - name: manifests-repo-url
            type: string
          - name: manifests-branch
            type: string
          - name: image-name
            type: string
          - name: image-tag
            type: string
        workspaces:
          - name: source
          - name: git-credentials
            optional: true
        steps:
          - name: update-image-tag
            # git コマンドが必要なため、git 入りのイメージを使用
            image: <MIRROR_REGISTRY>/udi-rhel9:latest
            script: |
              #!/bin/bash
              set -e

              WORK_DIR="/tmp/manifests"
              rm -rf "$WORK_DIR"

              echo "=== Clone manifests repo ==="
              if [ -f "$(workspaces.git-credentials.path)/.gitconfig" ]; then
                cp "$(workspaces.git-credentials.path)/.gitconfig" ~/.gitconfig
              fi
              if [ -f "$(workspaces.git-credentials.path)/.git-credentials" ]; then
                cp "$(workspaces.git-credentials.path)/.git-credentials" ~/.git-credentials
              fi

              git clone -b "$(params.manifests-branch)" "$(params.manifests-repo-url)" "$WORK_DIR"
              cd "$WORK_DIR"

              echo "=== Update image tag ==="
              cd base
              if command -v kustomize &> /dev/null; then
                kustomize edit set image "$(params.image-name)=$(params.image-name):$(params.image-tag)"
              else
                sed -i "s|newTag:.*|newTag: \"$(params.image-tag)\"|" kustomization.yaml
              fi
              cd ..

              echo "=== Commit and push ==="
              git config user.email "tekton-pipeline@example.com"
              git config user.name "Tekton Pipeline"
              git add -A
              git diff --cached --quiet || {
                git commit -m "Update image tag to $(params.image-tag)"
                git push origin "$(params.manifests-branch)"
              }

              echo "=== Done ==="
      params:
        - name: manifests-repo-url
          value: $(params.manifests-repo-url)
        - name: manifests-branch
          value: $(params.manifests-branch)
        - name: image-name
          value: $(params.image-name)
        - name: image-tag
          value: $(params.git-revision)
