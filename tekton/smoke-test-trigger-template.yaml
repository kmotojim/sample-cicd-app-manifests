# =============================================================================
# TriggerTemplate: Smoke Test PipelineRun 生成
#
# ArgoCD sync 成功通知を受信した際に、スモークテストパイプラインの
# PipelineRun を作成します。
#
# カスタマイズ箇所:
#   - <NAMESPACE>        : デプロイ先の namespace
#   - <APP_ROUTE_HOST>   : dev 環境の Route ホスト名
#   - <GITEA_HOST>       : Gitea のホスト名
#   - <GITEA_OWNER>      : Gitea のリポジトリオーナー
# =============================================================================
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: smoke-test-trigger-template
  namespace: <NAMESPACE>
spec:
  params:
    - name: app-revision
      description: デプロイされたリビジョン

  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: smoke-test-run-
        namespace: <NAMESPACE>
      spec:
        pipelineRef:
          name: smoke-test-pipeline
        params:
          - name: app-route-url
            value: https://<APP_ROUTE_HOST>
          - name: app-revision
            value: $(tt.params.app-revision)
          - name: gitea-host
            value: <GITEA_HOST>
          - name: manifests-repo-owner
            value: <GITEA_OWNER>
          - name: manifests-repo-name
            value: sample-cicd-app-manifests
        timeouts:
          pipeline: "10m"
