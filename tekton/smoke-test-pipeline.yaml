# =============================================================================
# Smoke Test Pipeline
#
# ArgoCD の dev 環境 sync 成功後にトリガーされます。
# curl でヘルスチェックと API 確認を行い、成功時に develop → main の PR を
# Gitea API で作成します。
#
# カスタマイズ箇所:
#   - <NAMESPACE>        : デプロイ先の namespace
#   - <GITEA_HOST>       : Gitea のホスト名
#   - <APP_ROUTE_HOST>   : dev 環境の Route ホスト名
# =============================================================================
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: smoke-test-pipeline
  namespace: <NAMESPACE>
spec:
  params:
    - name: app-route-url
      type: string
      description: デプロイされたアプリの Route URL
      default: https://<APP_ROUTE_HOST>
    - name: app-revision
      type: string
      description: デプロイされたアプリのリビジョン
      default: ""
    - name: gitea-host
      type: string
      description: Gitea ホスト名
      default: <GITEA_HOST>
    - name: manifests-repo-owner
      type: string
      description: Gitea リポジトリオーナー
      default: ""
    - name: manifests-repo-name
      type: string
      description: Gitea リポジトリ名
      default: sample-cicd-app-manifests

  tasks:
    # ------------------------------------------------------------------
    # Step 1: Smoke Test (curl ベース)
    # ------------------------------------------------------------------
    - name: smoke-test
      taskSpec:
        params:
          - name: app-url
            type: string
        steps:
          - name: health-check
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            script: |
              #!/bin/bash
              set -e

              APP_URL="$(params.app-url)"
              MAX_RETRIES=10
              RETRY_INTERVAL=10

              echo "=== Smoke Test: Health Check ==="
              echo "Target: ${APP_URL}"

              # ヘルスチェック（リトライ付き）
              for i in $(seq 1 $MAX_RETRIES); do
                echo "Attempt $i/$MAX_RETRIES..."
                HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" "${APP_URL}/health" || echo "000")
                if [ "$HTTP_CODE" = "200" ]; then
                  echo "Health check passed (HTTP $HTTP_CODE)"
                  break
                fi
                if [ "$i" = "$MAX_RETRIES" ]; then
                  echo "Health check failed after $MAX_RETRIES attempts"
                  exit 1
                fi
                echo "HTTP $HTTP_CODE - retrying in ${RETRY_INTERVAL}s..."
                sleep $RETRY_INTERVAL
              done

              echo ""
              echo "=== Smoke Test: API Check ==="

              # Vehicle state API 確認
              RESPONSE=$(curl -sk "${APP_URL}/api/vehicle/state")
              echo "GET /api/vehicle/state => $RESPONSE"

              # JSON にspeedフィールドがあることを簡易確認
              if echo "$RESPONSE" | grep -q '"speed"'; then
                echo "API check passed: 'speed' field found"
              else
                echo "API check failed: 'speed' field not found"
                exit 1
              fi

              # 静的ファイル配信確認
              HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" "${APP_URL}/" || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "Static files check passed"
              else
                echo "Static files check failed (HTTP $HTTP_CODE)"
                exit 1
              fi

              echo ""
              echo "=== All smoke tests passed ==="
      params:
        - name: app-url
          value: $(params.app-route-url)

    # ------------------------------------------------------------------
    # Step 2: Create PR (Gitea API)
    # ------------------------------------------------------------------
    - name: create-pr
      runAfter:
        - smoke-test
      taskSpec:
        params:
          - name: gitea-host
            type: string
          - name: repo-owner
            type: string
          - name: repo-name
            type: string
          - name: app-revision
            type: string
        steps:
          - name: create-pull-request
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            env:
              # Gitea API トークンを Secret から取得
              - name: GITEA_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: gitea-credentials
                    key: token
            script: |
              #!/bin/bash
              set -e

              GITEA_HOST="$(params.gitea-host)"
              OWNER="$(params.repo-owner)"
              REPO="$(params.repo-name)"
              REVISION="$(params.app-revision)"

              PR_TITLE="Promote to production: ${REVISION}"
              PR_BODY="Smoke tests passed for revision ${REVISION}.\n\nAutomatically created by Tekton smoke-test-pipeline."

              echo "=== Creating PR: develop -> main ==="
              echo "Repo: ${OWNER}/${REPO}"

              # 既存の open な PR があるか確認
              EXISTING=$(curl -sk \
                -H "Authorization: token ${GITEA_TOKEN}" \
                "https://${GITEA_HOST}/api/v1/repos/${OWNER}/${REPO}/pulls?state=open&head=${OWNER}:develop&base=main" \
                | grep -c '"id"' || true)

              if [ "$EXISTING" -gt "0" ]; then
                echo "Open PR already exists. Skipping creation."
                exit 0
              fi

              # PR 作成
              HTTP_CODE=$(curl -sk -o /tmp/pr-response.json -w "%{http_code}" \
                -X POST \
                -H "Authorization: token ${GITEA_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"title\":\"${PR_TITLE}\",\"body\":\"${PR_BODY}\",\"head\":\"develop\",\"base\":\"main\"}" \
                "https://${GITEA_HOST}/api/v1/repos/${OWNER}/${REPO}/pulls")

              if [ "$HTTP_CODE" = "201" ]; then
                PR_URL=$(cat /tmp/pr-response.json | grep -o '"html_url":"[^"]*"' | head -1 | cut -d'"' -f4)
                echo "PR created successfully: ${PR_URL}"
              else
                echo "Failed to create PR (HTTP $HTTP_CODE)"
                cat /tmp/pr-response.json
                exit 1
              fi
      params:
        - name: gitea-host
          value: $(params.gitea-host)
        - name: repo-owner
          value: $(params.manifests-repo-owner)
        - name: repo-name
          value: $(params.manifests-repo-name)
        - name: app-revision
          value: $(params.app-revision)
